name: sankofa_code_push
description: Check for and download Sankofa code push updates from your app.
version: 2.0.7
homepage: https://sankofa.dev
repository: https://github.com/sankofatech/updater/tree/main/sankofa_code_push

environment:
  sdk: ">=3.5.4 <4.0.0"
  flutter: ">=3.24.5"

dependencies:
  ffi: ^2.0.2
  meta: ^1.9.1

dev_dependencies:
  ffigen: ">=8.0.2 <21.0.0"
  mocktail: ^1.0.0
  # Used by integration tests under test/integration/ for FakePatchServer.
  # Not part of the package's public API or runtime dependencies.
  shelf: ^1.4.0
  test: ^1.19.2
  very_good_analysis: ">=7.0.0 <11.0.0"

ffigen:
  output: "lib/src/generated/updater_bindings.g.dart"
  name: "UpdaterBindings"
  headers:
    # Only the Dart-stable surface drives ffigen. Engine-only symbols live in
    # ../library/include/updater_engine.h and must NOT be reachable from the
    # generated bindings — the package's public ABI is exactly what this file
    # exposes.
    entry-points:
      - "../library/include/updater_dart.h"
  preamble: |
    // ignore_for_file: unused_element, unused_field
