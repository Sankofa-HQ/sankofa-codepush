# Generated by sankofa_ci --style static. Safe to edit.
# Run `sankofa_ci verify` to check for dep graph drift.
name: Sankofa CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      sankofa_code_push: ${{ steps.filter.outputs.sankofa_code_push }}
      sankofa_code_push_example: ${{ steps.filter.outputs.sankofa_code_push_example }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so dorny/paths-filter can diff on push events.
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
      - run: dart pub global activate sankofa_ci
      - name: Verify CI coverage
        run: sankofa_ci verify
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            sankofa_code_push:
              - sankofa_code_push/**
            sankofa_code_push_example:
              - sankofa_code_push/**
              - sankofa_code_push/example/**

  sankofa_code_push:
    needs: changes
    if: needs.changes.outputs.sankofa_code_push == 'true'
    uses: ./.github/workflows/_sankofa_ci_flutter.yaml
    with:
      package_name: sankofa_code_push
      package_path: sankofa_code_push
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: "example"
      flutter_version: ""
      has_integration_tests: false

  sankofa_code_push_example:
    needs: changes
    if: needs.changes.outputs.sankofa_code_push_example == 'true'
    uses: ./.github/workflows/_sankofa_ci_flutter.yaml
    with:
      package_name: sankofa_code_push_example
      package_path: sankofa_code_push/example
      has_bloc_lint: false
      has_unit_tests: false
      subpackages: ""
      flutter_version: ""
      has_integration_tests: false

  cspell:
    name: CSpell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: streetsidesoftware/cspell-action@v8
        with:
          incremental_files_only: false
          config: cspell.config.yaml

  required:
    name: required
    if: ${{ always() }}
    needs:
      - changes
      - sankofa_code_push
      - sankofa_code_push_example
      - cspell
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed (or were skipped because nothing changed)."

