# Generated by sankofa_ci --style static. Safe to edit.
# Run `sankofa_ci verify` to check for dep graph drift.
name: Sankofa CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      artifact_proxy: ${{ steps.filter.outputs.artifact_proxy }}
      dex: ${{ steps.filter.outputs.dex }}
      discord_gcp_alerts: ${{ steps.filter.outputs.discord_gcp_alerts }}
      flutter_version_resolver: ${{ steps.filter.outputs.flutter_version_resolver }}
      jwt: ${{ steps.filter.outputs.jwt }}
      scoped_deps: ${{ steps.filter.outputs.scoped_deps }}
      sankofa_build_trace: ${{ steps.filter.outputs.sankofa_build_trace }}
      sankofa_ci: ${{ steps.filter.outputs.sankofa_ci }}
      sankofa_cli: ${{ steps.filter.outputs.sankofa_cli }}
      sankofa_code_push_client: ${{ steps.filter.outputs.sankofa_code_push_client }}
      sankofa_code_push_protocol: ${{ steps.filter.outputs.sankofa_code_push_protocol }}
      sankofa_redis_client: ${{ steps.filter.outputs.sankofa_redis_client }}
      stripe_api: ${{ steps.filter.outputs.stripe_api }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so dorny/paths-filter can diff on push events.
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
      - run: dart pub global activate sankofa_ci
      - name: Verify CI coverage
        run: sankofa_ci verify
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            artifact_proxy:
              - packages/artifact_proxy/**
            dex:
              - packages/dex/**
            discord_gcp_alerts:
              - packages/discord_gcp_alerts/**
            flutter_version_resolver:
              - packages/flutter_version_resolver/**
            jwt:
              - packages/jwt/**
            scoped_deps:
              - packages/scoped_deps/**
            sankofa_build_trace:
              - packages/sankofa_build_trace/**
            sankofa_ci:
              - packages/sankofa_ci/**
            sankofa_cli:
              - packages/dex/**
              - packages/jwt/**
              - packages/sankofa_build_trace/**
              - packages/sankofa_cli/**
              - packages/sankofa_code_push_client/**
              - packages/sankofa_code_push_protocol/**
            sankofa_code_push_client:
              - packages/sankofa_code_push_client/**
              - packages/sankofa_code_push_protocol/**
            sankofa_code_push_protocol:
              - packages/sankofa_code_push_protocol/**
            sankofa_redis_client:
              - packages/redis_client/**
            stripe_api:
              - packages/stripe_api/**

  artifact_proxy:
    needs: changes
    if: needs.changes.outputs.artifact_proxy == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: artifact_proxy
      package_path: packages/artifact_proxy
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  dex:
    needs: changes
    if: needs.changes.outputs.dex == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: dex
      package_path: packages/dex
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  discord_gcp_alerts:
    needs: changes
    if: needs.changes.outputs.discord_gcp_alerts == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: discord_gcp_alerts
      package_path: packages/discord_gcp_alerts
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  flutter_version_resolver:
    needs: changes
    if: needs.changes.outputs.flutter_version_resolver == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: flutter_version_resolver
      package_path: packages/flutter_version_resolver
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  jwt:
    needs: changes
    if: needs.changes.outputs.jwt == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: jwt
      package_path: packages/jwt
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  scoped_deps:
    needs: changes
    if: needs.changes.outputs.scoped_deps == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: scoped_deps
      package_path: packages/scoped_deps
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  sankofa_build_trace:
    needs: changes
    if: needs.changes.outputs.sankofa_build_trace == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: sankofa_build_trace
      package_path: packages/sankofa_build_trace
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  sankofa_ci:
    needs: changes
    if: needs.changes.outputs.sankofa_ci == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: sankofa_ci
      package_path: packages/sankofa_ci
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  sankofa_cli:
    needs: changes
    if: needs.changes.outputs.sankofa_cli == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: sankofa_cli
      package_path: packages/sankofa_cli
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  sankofa_code_push_client:
    needs: changes
    if: needs.changes.outputs.sankofa_code_push_client == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: sankofa_code_push_client
      package_path: packages/sankofa_code_push_client
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  sankofa_code_push_protocol:
    needs: changes
    if: needs.changes.outputs.sankofa_code_push_protocol == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: sankofa_code_push_protocol
      package_path: packages/sankofa_code_push_protocol
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  sankofa_redis_client:
    needs: changes
    if: needs.changes.outputs.sankofa_redis_client == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: sankofa_redis_client
      package_path: packages/redis_client
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""
      needs_redis: true

  stripe_api:
    needs: changes
    if: needs.changes.outputs.stripe_api == 'true'
    uses: ./.github/workflows/_sankofa_ci_dart.yaml
    with:
      package_name: stripe_api
      package_path: packages/stripe_api
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""

  cspell:
    name: CSpell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: streetsidesoftware/cspell-action@v8
        with:
          incremental_files_only: false
          config: cspell.config.yaml

  required:
    name: required
    if: ${{ always() }}
    needs:
      - changes
      - artifact_proxy
      - dex
      - discord_gcp_alerts
      - flutter_version_resolver
      - jwt
      - scoped_deps
      - sankofa_build_trace
      - sankofa_ci
      - sankofa_cli
      - sankofa_code_push_client
      - sankofa_code_push_protocol
      - sankofa_redis_client
      - stripe_api
      - cspell
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed (or were skipped because nothing changed)."

