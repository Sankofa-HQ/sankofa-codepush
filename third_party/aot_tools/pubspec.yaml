name: sankofa_aot_tools
description: >
  Sankofa's drop-in replacement for the closed-source aot-tools.dill that
  Shorebird's CLI fetched from download.shorebird.dev. Implements the
  patch-creation orchestration spec'd at
  research/aot-tools-decompile/CODEPUSH_SPEC.md from analyze_snapshot +
  gen_snapshot + Linker, producing a .vmcode file the Sankofa engine's
  updater can apply on device.
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.4.2
